<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LinkedIn banner for Kittisak Hanheam">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="25%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#4dd0e1" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#4dd0e1" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="80%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#64b5f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#64b5f6" stop-opacity="0"/>
    </radialGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#glowLeft)"/>
  <rect width="1200" height="280" fill="url(#glowRight)"/>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle" fill="#ffffff">
    <text x="600" y="108" font-size="42" font-weight="700" letter-spacing="0.2" filter="url(#softShadow)">
      Kittisak Hanheam
    </text>

    <text x="600" y="156" font-size="21" font-weight="600" fill="#eef7fb">
      AIoT Full Stack Developer | Embedded Systems | System Integration, Security &amp; Deployment
    </text>

    <line x1="175" y1="176" x2="1025" y2="176" stroke="#d7ecf5" stroke-opacity="0.32" stroke-width="1"/>

    <text x="600" y="212" font-size="18" font-weight="500" fill="#d9edf7" letter-spacing="0.15">
      Exploring IIoT, Rust, PLC, SCADA &amp; Industrial Automation
    </text>
